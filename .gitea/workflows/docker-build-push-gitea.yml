name: Build and Push Image
on: 
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ vars.REGISTRY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image refs (lowercase)
        run: |
          envfile="${GITHUB_ENV:-${GITEA_ENV:-}}"
          if [ -z "$envfile" ]; then
            echo "No env file found (GITHUB_ENV/GITEA_ENV)." >&2
            exit 1
          fi

          repo_raw='${{ gitea.repository }}'
          repo_lc="$(printf '%s' "$repo_raw" | tr '[:upper:]' '[:lower:]')"
          repo_name_lc="${repo_lc#*/}"

          echo "IMAGE_NAME=$repo_lc" >> "$envfile"
          echo "IMAGE=${REGISTRY}/$repo_lc" >> "$envfile"
          echo "IMAGE_GHCR=ghcr.io/$repo_lc" >> "$envfile"
          echo "IMAGE_DOCKERHUB=${{ secrets.DOCKERHUB_USERNAME }}/$repo_name_lc" >> "$envfile"
          # Cache is intentionally stored only in the primary (Gitea) registry.
          echo "GITEA_BUILDCACHE_REF=${REGISTRY}/${repo_lc}-cache:buildcache" >> "$envfile"

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (Gitea full tags)
        id: meta_gitea
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ gitea.ref == format('refs/heads/{0}', gitea.event.repository.default_branch) }}

      - name: Extract metadata (GHCR and Docker Hub limited tags)
        id: meta_external
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_GHCR }}
            ${{ env.IMAGE_DOCKERHUB }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable=${{ gitea.ref == format('refs/heads/{0}', gitea.event.repository.default_branch) }}

      - name: Show resolved image tags
        run: |
          echo "Images:"
          echo "- $IMAGE"
          echo "- $IMAGE_GHCR"
          echo "- $IMAGE_DOCKERHUB"
          echo "Cache (Gitea only): $GITEA_BUILDCACHE_REF"
          echo "Gitea tags:"
          echo "${{ steps.meta_gitea.outputs.tags }}"
          echo "GHCR/Docker Hub tags:"
          echo "${{ steps.meta_external.outputs.tags }}"

      - name: Build and push image (Gitea full tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_gitea.outputs.tags }}
          labels: ${{ steps.meta_gitea.outputs.labels }}
          cache-from: type=registry,ref=${{ env.GITEA_BUILDCACHE_REF }}
          cache-to: type=registry,ref=${{ env.GITEA_BUILDCACHE_REF }},mode=max

      - name: Build and push image (GHCR and Docker Hub limited tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta_external.outputs.tags }}
          labels: ${{ steps.meta_external.outputs.labels }}
          cache-from: type=registry,ref=${{ env.GITEA_BUILDCACHE_REF }}

